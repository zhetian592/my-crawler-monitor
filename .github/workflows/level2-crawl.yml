name: Level2 Crawl (每3小时 - 二级信源)

on:
  schedule:
    - cron: '0 */3 * * *'   # 每3小时
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行二级爬虫
        run: python crawler.py

      - name: 更新报告
        run: echo "Level2 crawl completed at $(date)"
