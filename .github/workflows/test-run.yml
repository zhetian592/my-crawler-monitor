name: Test Run - 强制生成报告

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成测试报告
        run: |
          cat > report.md << 'EOF'
# 内容安全行业舆情报告
更新时间：$(date +'%Y-%m-%d %H:%M:%S')

## 测试报告 - Level1
**事件简述**：一级信源（美国之音、BBC、RFA 等）有新涉华内容
**原文链接**：https://www.voachinese.com/China
**潜在风险点**：反华内容，可能涉及内容安全舆情

## 测试报告 - Level2
**事件简述**：二级信源有新反华文章
**原文链接**：对应网站
**潜在风险点**：反华内容，可能涉及内容安全舆情

系统测试运行成功。
EOF

      - name: 提交报告
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Test run - 生成报告"
