name: 内容安全舆情监控爬虫

on:
  schedule:
    - cron: '0 * * * *'      # 每小时运行
  workflow_dispatch:         # 手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行爬虫并生成报告
        run: python crawler.py
