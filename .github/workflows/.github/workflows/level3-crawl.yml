name: Level3 Crawl (每6小时 - 三级信源)

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时运行一次
  workflow_dispatch:        # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行三级爬虫
        run: python crawler.py

      - name: 更新报告
        run: echo "Level3 crawl completed at $(date)"
