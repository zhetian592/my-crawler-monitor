name: Update Nitter Instances

on:
  schedule:
    # 每天 UTC 02:00 运行（北京时间 10:00），减少不必要的执行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run instance discovery script
        id: discover
        run: python scripts/update_nitter_instances.py

      - name: Check if healthy_nitter.json is valid
        id: check
        run: |
          if [ -f healthy_nitter.json ] && [ -s healthy_nitter.json ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.valid == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto update healthy Nitter instances"
          file_pattern: "healthy_nitter.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          branch: main
