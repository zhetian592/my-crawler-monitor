      - name: Commit and push reports (调试)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          echo "======== 当前目录 ========"
          pwd
          ls -la
          echo "======== 检查关键文件 ========"
          ls -lh report.md report.html 2>/dev/null || echo "report files not found"
          ls -lhd reports data 2>/dev/null || true
          echo "======== Git 添加前状态 ========"
          git status
          echo "======== 执行 git add -A ========"
          git add -A
          echo "======== Git 暂存区状态 ========"
          git status
          echo "======== 尝试提交 ========"
          if git diff --cached --quiet; then
            echo "暂存区无变化，无法提交"
          else
            git commit -m "自动更新报告 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
