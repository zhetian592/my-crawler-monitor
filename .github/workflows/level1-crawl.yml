name: Level1 Crawl (每小时 - 一级重要信源)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成最新报告
        run: |
          cat > report.md << 'EOF'
# 内容安全行业舆情报告
更新时间：$(date +'%Y-%m-%d %H:%M:%S')

## 【Level 1】每小时 - 一级重要信源
**事件简述**：美国之音、BBC中文网、RFA、自由亚洲电台等发布最新涉华/反华内容  
**原文链接**：https://www.voachinese.com/China 等  
**潜在风险点**：反华内容，可能涉及内容安全舆情

## 【Level 2】每3小时 - 二级信源
**事件简述**：大纪元、品葱、博讯、中国数字时代等更新反华文章  
**原文链接**：对应网站  
**潜在风险点**：反华内容，可能涉及内容安全舆情

## 【Level 3】每6小时 - 三级信源
**事件简述**：端传媒、明报、希望之声等发布涉敏报道  
**原文链接**：对应网站  
**潜在风险点**：涉华敏感内容，可能引发舆情风险

---
系统已按分级定时运行。一级每小时，二级每3小时，三级每6小时。
EOF

      - name: 提交报告更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动生成舆情报告 - Level1 $(date +'%Y-%m-%d %H:%M')"
          branch: main
